<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iThinkAI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <svg class="logo" viewBox="0 0 128 128" aria-hidden="true">
        <defs>
          <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#A78BFA"/>
            <stop offset="55%" stop-color="#7C6DF7"/>
            <stop offset="100%" stop-color="#4F46E5"/>
          </linearGradient>
          <radialGradient id="pgloss" cx="28%" cy="22%" r="55%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
            <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.08"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="pbar" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#DDD6FE"/>
          </linearGradient>
        </defs>
        <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#pbg)"/>
        <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#pgloss)"/>
        <rect x="42" y="34" width="16" height="60" rx="7" fill="url(#pbar)"/>
        <rect x="70" y="34" width="16" height="60" rx="7" fill="url(#pbar)"/>
      </svg>
      <h1 class="brand">iThinkAI</h1>
      <p class="tagline" data-i18n="tagline"></p>
    </header>

    <div class="main-toggle">
      <span class="main-toggle-text" data-i18n="enableExtension"></span>
      <label class="toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <nav class="tabs">
      <button class="tab active" data-tab="settings" data-i18n="tabSettings"></button>
      <button class="tab" data-tab="history" data-i18n="tabHistory"></button>
      <button class="tab" data-tab="stats" data-i18n="tabStats"></button>
    </nav>

    <!-- Settings -->
    <section class="tab-content active" id="tab-settings">
      <div class="row">
        <span class="row-label" data-i18n="countdownSeconds"></span>
        <div class="stepper">
          <button class="stepper-btn" id="countdown-dec" aria-label="decrease">−</button>
          <span class="stepper-value" id="countdown-value">10</span>
          <button class="stepper-btn" id="countdown-inc" aria-label="increase">+</button>
        </div>
      </div>

      <div class="row">
        <span class="row-label" data-i18n="showThinkingBox"></span>
        <label class="toggle">
          <input type="checkbox" id="showThinkingBox" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="row">
        <span class="row-label" data-i18n="requireThinking"></span>
        <label class="toggle">
          <input type="checkbox" id="requireThinking">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="section-title" data-i18n="enabledPlatforms"></div>
      <div id="platforms-list" class="platforms-list"></div>
    </section>

    <!-- History -->
    <section class="tab-content" id="tab-history">
      <div id="history-list" class="history-list"></div>
      <button class="btn-clear" id="clear-history" data-i18n="clearHistory"></button>
    </section>

    <!-- Stats -->
    <section class="tab-content" id="tab-stats">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-sessions">0</div>
          <div class="stat-label" data-i18n="statSessions"></div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-time">0m</div>
          <div class="stat-label" data-i18n="statTime"></div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-written">0</div>
          <div class="stat-label" data-i18n="statWritten"></div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-rate">0%</div>
          <div class="stat-label" data-i18n="statRate"></div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <span>v1.3.1</span>
      <span class="footer-dot">·</span>
      <span data-i18n="footerMotto"></span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
